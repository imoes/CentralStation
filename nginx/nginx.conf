events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker's internal DNS — re-resolves container names dynamically
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # AI endpoints can run long (generative dashboard ~35s, it-aikb
            # DeepSearch up to 300s). Default 60s caused 504s on those.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location /ws/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Werkbank Web-IDE (code-server). Per-user containers cs-ide-<uid>.
        # auth_request gates every request via the backend; the backend returns
        # the per-user upstream in X-IDE-Upstream. code-server runs --auth none
        # and has no published host port, so this gate is load-bearing.
        location = /_ide_authz {
            internal;
            set $backend http://backend:8000;
            proxy_pass $backend/api/ide/authz;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        location ~ ^/ide/[^/]+/ {
            auth_request /_ide_authz;
            auth_request_set $ide_up $upstream_http_x_ide_upstream;
            rewrite ^/ide/[^/]+/(.*)$ /$1 break;
            proxy_pass http://$ide_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_hide_header X-Frame-Options;
        }

        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # API
        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # AI endpoints can run long (generative dashboard ~35s, it-aikb
            # DeepSearch up to 300s). Default 60s caused 504s on those.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # WebSocket
        location /ws/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Werkbank Web-IDE (code-server) — see HTTP block above for rationale.
        location = /_ide_authz {
            internal;
            set $backend http://backend:8000;
            proxy_pass $backend/api/ide/authz;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        location ~ ^/ide/[^/]+/ {
            auth_request /_ide_authz;
            auth_request_set $ide_up $upstream_http_x_ide_upstream;
            rewrite ^/ide/[^/]+/(.*)$ /$1 break;
            proxy_pass http://$ide_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_hide_header X-Frame-Options;
        }

        # Angular Frontend
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
