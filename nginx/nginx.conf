events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker's internal DNS — re-resolves container names dynamically
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Redirect all HTTP to HTTPS — required for crypto.subtle / Secure Context
    # (Chrome/Edge enforce Secure Context for VS Code extension webviews)
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/certs/star_ippen_media.crt;
        ssl_certificate_key /etc/nginx/ssl/private/star_ippen_media.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # CentralStation WebSocket — MUST come before /api/ (more specific)
        # Backend registers it at /api/ws (prefix="/api" + route="/ws")
        location = /api/ws {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # REST API
        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # AI endpoints can run long (generative dashboard ~35s, it-aikb
            # DeepSearch up to 300s). Default 60s caused 504s on those.
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Werkbank Web-IDE (code-server). Per-user containers cs-ide-<uid>.
        # auth_request gates every request via the backend; the backend returns
        # the per-user upstream in X-IDE-Upstream. code-server runs --auth none
        # and has no published host port, so this gate is load-bearing.
        location = /_ide_authz {
            internal;
            set $backend http://backend:8000;
            proxy_pass $backend/api/ide/authz;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header Cookie $http_cookie;
        }

        # code-server lives at /ide/<uid>/ but is proxied with the prefix stripped.
        # Its service worker registers with scope /ide/<uid>/ — broader than the SW
        # script's own path allows by default. Service-Worker-Allowed authorises that
        # scope. This SW is load-bearing: besides fixing blank-on-reload, it SERVES
        # the extension webviews' CSS/JS — without it panels (e.g. Claude Code) render
        # completely unstyled. (coder/code-server#2106 + #2038)
        location ~ ^/ide/(?<ide_uid>[^/]+)/ {
            auth_request /_ide_authz;
            auth_request_set $ide_up $upstream_http_x_ide_upstream;
            proxy_hide_header Service-Worker-Allowed;
            add_header Service-Worker-Allowed /ide/$ide_uid/ always;
            rewrite ^/ide/[^/]+/(.*)$ /$1 break;
            proxy_pass http://$ide_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_hide_header X-Frame-Options;
        }

        # Claude Code extension in code-server constructs WebSocket URLs relative to
        # window.location.origin, not the /ide/<uid>/ subpath.
        # This catches wss://host/ws?token=... and routes it to the user's IDE container
        # via auth_request — same mechanism as /ide/<uid>/.
        location = /ws {
            auth_request /_ide_authz;
            auth_request_set $ide_up $upstream_http_x_ide_upstream;
            proxy_pass http://$ide_up;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Angular Frontend
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
