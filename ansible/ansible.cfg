# Ansible config for the CentralStation Manual AWX project.
# AWX mounts this directory as the "local" project root
# (/var/lib/awx/projects/local); roles are auto-discovered under ./roles.
[defaults]
roles_path     = ./roles
inventory      = ./inventory/hosts
host_key_checking = False
stdout_callback = yaml
retry_files_enabled = False

[ssh_connection]
pipelining = True
