# docker-compose.override.yml — Lokale Overrides (Proxy, Ports, Dev-Mounts)
#
# Kopieren und anpassen:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Docker Compose lädt docker-compose.override.yml automatisch zusätzlich zu
# docker-compose.yml — kein -f Flag nötig. Die Datei ist in .gitignore und
# enthält ausschließlich umgebungsspezifische Einstellungen.
#
# Proxy-Einstellungen: Nur setzen wenn ein HTTP-Proxy benötigt wird.
# Ohne Proxy diese Datei leer lassen oder alle environment-Blöcke entfernen.

services:
  backend:
    # Build-Args: Proxy zur Build-Zeit (apt-get, pip).
    build:
      args:
        HTTP_PROXY: http://proxy.example.com:3128
        HTTPS_PROXY: http://proxy.example.com:3128
        NO_PROXY: localhost,127.0.0.1,db,redis,opensearch,.example.com
    # Environment: Proxy zur Laufzeit (ausgehende Verbindungen des Backends).
    environment:
      HTTP_PROXY: http://proxy.example.com:3128
      HTTPS_PROXY: http://proxy.example.com:3128
      NO_PROXY: localhost,127.0.0.1,db,redis,opensearch,.example.com

  frontend:
    build:
      args:
        HTTP_PROXY: http://proxy.example.com:3128
        HTTPS_PROXY: http://proxy.example.com:3128

  # Build-Args für das Userenv-Image (code-server + Hermes).
  # Werden nur beim Build (docker compose build userenv) ausgewertet.
  userenv:
    build:
      args:
        HTTP_PROXY: http://proxy.example.com:3128
        HTTPS_PROXY: http://proxy.example.com:3128
        NO_PROXY: localhost,127.0.0.1,.example.com

  codeserver:
    build:
      args:
        HTTP_PROXY: http://proxy.example.com:3128
        HTTPS_PROXY: http://proxy.example.com:3128
        NO_PROXY: localhost,127.0.0.1,.example.com
