services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: centralstation
      POSTGRES_USER: centralstation
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centralstation"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u admin:${OPENSEARCH_PASSWORD} https://localhost:9200/_cluster/health --insecure | grep -qv '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://centralstation:${POSTGRES_PASSWORD}@db:5432/centralstation
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENSEARCH_URL: https://opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      CENTRALCORE_URL: http://centralcore:8001
      HTTP_PROXY: http://proxy.ippen.media:80
      HTTPS_PROXY: http://proxy.ippen.media:80
      NO_PROXY: localhost,127.0.0.1,db,redis,opensearch,centralcore,awx,awx-db,awx-redis,.ippen.media
      # Werkbank Web-IDE: backend orchestrates per-user code-server containers.
      IDE_IMAGE: centralstation-codeserver:latest
      IDE_NETWORK: centralstation_default
      IDE_HOST_SSH_DIR: ${HOME}/.ssh
      IDE_CONTAINER_PORT: "8080"
      # Workspaces are bind-mounted from this host path into each cs-ide container.
      # The backend also mounts this path so os.makedirs() creates dirs on the host.
      IDE_WORKSPACES_BASE: ${IDE_WORKSPACES_BASE:-/opt/centralstation/ide-workspaces}
      # Shared Ansible playbooks dir — same host path AWX mounts as Manual SCM project.
      # Mounted read-write into each IDE container at /root/workspaces/playbooks.
      # Edit in VS Code → AWX sees the change immediately (no Git sync).
      IDE_PLAYBOOKS_PATH: ${IDE_PLAYBOOKS_PATH:-/home/mutkluge/Dev/code/CentralStation/playbooks}
    volumes:
      # Docker socket so the backend can start/stop per-user cs-ide-* containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspace bind-mount base — same path inside backend = same path on host.
      - ${IDE_WORKSPACES_BASE:-/opt/centralstation/ide-workspaces}:${IDE_WORKSPACES_BASE:-/opt/centralstation/ide-workspaces}
      # Playbooks dir — same path so backend can write files during publish_playbook().
      - ${IDE_PLAYBOOKS_PATH:-/home/mutkluge/Dev/code/CentralStation/playbooks}:${IDE_PLAYBOOKS_PATH:-/home/mutkluge/Dev/code/CentralStation/playbooks}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:4200:80"

  centralcore:
    build:
      context: ./centralcore
      # Hermes is git-cloned + pip-installed during docker build.
      # Rebuild to update Hermes: docker compose build centralcore
    restart: unless-stopped
    environment:
      CENTRALCORE_URL: http://centralcore:8001
      HTTP_PROXY: http://proxy.ippen.media:80
      HTTPS_PROXY: http://proxy.ippen.media:80
      NO_PROXY: localhost,127.0.0.1,backend,.ippen.media
    volumes:
      # Project-local .hermes dir (session state, skills); config.yaml is
      # overlaid below so the container uses llamacpp03 as its LLM provider.
      # Relative path (not ${PWD}) so it always resolves to the compose-file
      # directory — ${PWD} created a stray root-owned frontend/.hermes when
      # compose was invoked from a subdirectory.
      - ./.hermes:/root/.hermes
      - ./centralcore/hermes_config.yaml:/root/.hermes/config.yaml:ro
      # SSH config from the project directory — no system-wide changes needed
      - ./centralcore/ssh_config:/root/.ssh_project_config:ro
      # SSH keys from the host (read-only)
      - ${HOME}/.ssh:/root/.ssh_host:ro
      # Claude & OpenAI OAuth tokens are stored in the DB and injected per session
      # via the centralcore proxy — no credential file mount needed.
    ports:
      - "127.0.0.1:8001:8001"
    cap_add:
      - NET_RAW
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Build-only service: produces the centralstation-codeserver:latest image.
  # Per-user containers are started at runtime by the backend (app/api/ide.py),
  # NOT by compose — hence the "ide" profile keeps it out of `up`.
  codeserver:
    build:
      context: .
      dockerfile: Dockerfile.codeserver
      args:
        HTTP_PROXY: http://proxy.ippen.media:80
        HTTPS_PROXY: http://proxy.ippen.media:80
        NO_PROXY: localhost,127.0.0.1,.ippen.media
    image: centralstation-codeserver:latest
    profiles: ["ide"]
    command: ["--version"]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

